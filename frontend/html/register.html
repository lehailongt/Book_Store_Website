<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - BookStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/register.css">
    <script defer src="../javascript/header.js"></script>
    <script defer src="../javascript/register.js"></script>
</head>
<body>

    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-form-wrapper">
                <div class="form-header">
                    <h1><i class="bi bi-person-plus"></i> Đăng Ký Tài Khoản</h1>
                    <p>Tạo tài khoản mới để bắt đầu bán sách</p>
                </div>

                <form id="registerForm" action="" method="post">
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="email" class="form-label"><i class="bi bi-envelope"></i> Email</label>
                            <input type="text" class="form-control" id="email" name="email" placeholder="example@gmail.com" required>
                            <div class="error"></div>
                        </div>

                        <div class="form-group col-md-6">
                            <label for="phone" class="form-label"><i class="bi bi-telephone"></i> Số Điện Thoại</label>
                            <input type="text" class="form-control" id="phone" name="phonenumber" placeholder="0123456789" required>
                            <div class="error"></div>
                        </div>
                    </div>

                    <div class="form-group fullname">
                        <label for="fullname" class="form-label"><i class="bi bi-person"></i> Họ và Tên</label>
                        <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required>
                        <div class="error"></div>
                    </div>

                    <div class="form-group date">
                        <label for="date" class="form-label"><i class="bi bi-calendar"></i> Ngày Sinh</label>
                        <input type="date" class="form-control" id="date" name="date" required>
                        <div class="error"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="password" class="form-label"><i class="bi bi-lock"></i> Mật Khẩu</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu" required>
                            <div class="error"></div>
                        </div>

                        <div class="form-group col-md-6">
                            <label for="password2" class="form-label"><i class="bi bi-lock"></i> Xác Nhận Mật Khẩu</label>
                            <input type="password" class="form-control" id="password2" name="password2" placeholder="Nhập lại mật khẩu" required>
                            <div class="error"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-register">
                            <i class="bi bi-check-circle"></i> Đăng Ký
                        </button>
                        <button type="reset" class="btn btn-reset">
                            <i class="bi bi-arrow-clockwise"></i> Xóa
                        </button>
                    </div>
                </form>

                <div class="auth-links">
                    <p>Đã có tài khoản? <a href="./login.html"><i class="bi bi-arrow-right"></i> Đăng nhập ngay</a></p>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
