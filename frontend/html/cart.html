<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Trang Chủ</title>
    <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/cart.css">
    <script defer src="../javascript/cart.js"></script>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="nav-logo">
            <h2><i class="bi bi-book"></i> BookStore</h2>    
        </div>
        <div class="nav-menu">
            <ul>
                <li><a href="./home.html"><i class="bi bi-house"></i> Trang Chủ</a></li>
                <li><a href="./book.html"><i class="bi bi-book"></i> Sách</a></li>
                <li><a href="./sell-book.html"><i class="bi bi-plus-lg"></i> Bán Sách</a></li>
                <li><a href="./cart.html"><i class="bi bi-cart"></i> Giỏ Hàng</a></li>
                <li><a href="./login.html"><i class="bi bi-person"></i> Đăng Nhập</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="cart-main">
    <div class="cart-container">
        <h1>Giỏ Hàng</h1>
        <div class="cart-table-wrapper">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Book ID</th>
                        <th>Số lượng</th>
                        <th>Giá</th>
                        <th>Tổng</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cartBody">
                    <!-- items injected -->
                </tbody>
            </table>
        </div>

        <div class="cart-summary">
            <div class="summary-box">
                <h3>Thông Tin Giao Hàng</h3>
                <div class="form-group">
                    <label for="shipName">Họ và tên</label>
                    <input type="text" id="shipName" class="form-control">
                </div>
                <div class="form-group">
                    <label for="shipAddress">Nơi nhận hàng</label>
                    <input type="text" id="shipAddress" class="form-control">
                </div>
                <div class="form-group">
                    <label for="shipPhone">Số điện thoại</label>
                    <input type="text" id="shipPhone" class="form-control">
                </div>
                <h3>Phương thức thanh toán</h3>
                <div class="form-group payment-methods">
                    <label><input type="radio" name="payment" value="cod" checked> Thanh toán khi nhận hàng</label><br>
                    <label><input type="radio" name="payment" value="card"> Thẻ tín dụng</label><br>
                    <label><input type="radio" name="payment" value="paypal"> PayPal</label>
                </div>
            </div>

            <div class="summary-box summary-right">
                <h3>Tóm Tắt Đơn Hàng</h3>
                <p class="total-line">Tổng cộng: <span id="totalAmount">0</span>đ</p>
                <button id="checkoutBtn" class="btn btn-primary">THANH TOÁN</button>
                <a href="./book.html" class="continue-link">Tiếp tục mua sắm</a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
