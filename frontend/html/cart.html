<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Trang Chủ</title>
    <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/cart.css">
    <script defer src="../javascript/header.js"></script>
    <script defer src="../javascript/cart.js"></script>
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="nav-logo">
                <h2><i class="bi bi-book"></i> BookStore</h2>
            </div>
            <div class="nav-menu">
                <!-- Injected via header.js -->
            </div>
        </nav>
    </header>

    <main class="cart-main">
        <div class="cart-container">
            <h1>Giỏ Hàng</h1>
            
            <div class="cart-wrapper">
                <div class="cart-table-section">
                    <div class="cart-table-wrapper">
                        <table class="cart-table">
                            <thead>
                                <tr>
                                    <th class="col-id">Mã Sách</th>
                                    <th class="col-image">Ảnh</th>
                                    <th class="col-name">Tên Sách</th>
                                    <th class="col-author">Tác Giả</th>
                                    <th class="col-qty">Số Lượng</th>
                                    <th class="col-price">Giá</th>
                                    <th class="col-total">Tổng</th>
                                    <th class="col-action">Thao Tác</th>
                                </tr>
                            </thead>
                            <tbody id="cartBody">
                                <!-- items injected -->
                            </tbody>
                        </table>
                    </div>
                    <div class="cart-pagination" id="cartPagination"></div>
                </div>

                <div class="cart-sidebar">
                    <div class="summary-card">
                        <h3>Thông Tin Giao Hàng</h3>
                        <div class="form-group">
                            <label for="shipAddress">Địa chỉ nhận hàng</label>
                            <input type="text" id="shipAddress" class="form-control" placeholder="Nhập địa chỉ...">
                        </div>
                    </div>

                    <div class="summary-card">
                        <h3>Tóm Tắt Đơn Hàng</h3>
                        <div class="summary-line">
                            <span>Tổng cộng:</span>
                            <span id="totalAmount" class="amount">0đ</span>
                        </div>
                        <button id="checkoutBtn" class="btn-checkout">THANH TOÁN</button>
                        <a href="./book.html" class="link-continue">← Tiếp tục mua sắm</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay Loading -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="spinner"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="custom-modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h4>Xác nhận</h4>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">Bạn có chắc chắn muốn xóa sản phẩm này khỏi giỏ hàng?</p>
            </div>
            <div class="modal-actions">
                <button id="btnCancelModal" class="btn btn-secondary">Hủy</button>
                <button id="btnConfirmModal" class="btn btn-danger">Xóa</button>
            </div>
        </div>
    </div>
</body>

</html>
