<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Trang Chủ</title>
    <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/cart.css">
    <script defer src="../javascript/header.js"></script>
    <script defer src="../javascript/cart.js"></script>
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="nav-logo">
                <h2><i class="bi bi-book"></i> BookStore</h2>
            </div>
            <div class="nav-menu">
                <ul>
                    <li><a href="./home.html"><i class="bi bi-house"></i> Trang Chủ</a></li>
                    <li><a href="./book.html"><i class="bi bi-book"></i> Sách</a></li>
                    <li><a href="./cart.html" class="cart-nav-link"><i class="bi bi-cart"></i> Giỏ Hàng <span
                                id="cartBadge" class="cart-badge" style="display:none;">0</span></a></li>
                    <li><a href="./login.html"><i class="bi bi-person"></i> Đăng Nhập</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="cart-main">
        <div class="cart-container">
            <h1>Giỏ Hàng</h1>
            <div class="cart-table-wrapper">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Book ID</th>
                            <th>Số lượng</th>
                            <th>Giá</th>
                            <th>Tổng</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cartBody">
                        <!-- items injected -->
                    </tbody>
                </table>
            </div>

            <div class="cart-summary">
                <div class="summary-box">
                    <h3>Thông Tin Giao Hàng</h3>
                    <div class="form-group">
                        <label for="shipAddress">Nơi nhận hàng</label>
                        <input type="text" id="shipAddress" class="form-control">
                    </div>
                    <h3>Phương thức thanh toán</h3>
                    <div class="form-group payment-methods">
                        <label><input type="radio" name="payment" value="cod" checked> Thanh toán khi nhận
                            hàng</label><br>
                        <label><input type="radio" name="payment" value="card"> Thẻ tín dụng</label><br>
                        <label><input type="radio" name="payment" value="paypal"> PayPal</label>
                    </div>
                </div>

                <div class="summary-box summary-right">
                    <h3>Tóm Tắt Đơn Hàng</h3>
                    <p class="total-line">Tổng cộng: <span id="totalAmount">0đ</span></p>
                    <button id="checkoutBtn" class="btn btn-primary btn-block">THANH TOÁN</button>
                    <a href="./book.html" class="continue-link">Tiếp tục mua sắm</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay Loading -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="spinner"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="custom-modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h4>Xác nhận</h4>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">Bạn có chắc chắn muốn xóa sản phẩm này khỏi giỏ hàng?</p>
            </div>
            <div class="modal-actions">
                <button id="btnCancelModal" class="btn btn-secondary">Hủy</button>
                <button id="btnConfirmModal" class="btn btn-danger">Xóa</button>
            </div>
        </div>
    </div>
</body>

</html>
