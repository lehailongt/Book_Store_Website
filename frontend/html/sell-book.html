<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bán Sách</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/sell-book.css">
    <script defer src="../javascript/header.js"></script>
    <script defer src="../javascript/sell-book.js"></script>
</head>
<body>
    <!-- Sell Book Form -->
    <div class="container-sell">
        <div class="sell-book-form">
            <h2>Đăng Sách Bán</h2>
            <form id="sellBookForm" method="post" enctype="multipart/form-data">
                
                <!-- Book Title -->
                <div class="form-group">
                    <label for="bookTitle" class="form-label">Tên Sách *</label>
                    <input type="text" class="form-control" id="bookTitle" name="bookTitle" placeholder="Nhập tên sách" required>
                    <div class="error"></div>
                </div>

                <!-- Author -->
                <div class="form-group">
                    <label for="author" class="form-label">Tác Giả *</label>
                    <input type="text" class="form-control" id="author" name="author" placeholder="Nhập tên tác giả" required>
                    <div class="error"></div>
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label for="category" class="form-label">Thể Loại *</label>
                    <select class="form-control" id="category" name="category" required>
                        <option value="">-- Chọn thể loại --</option>
                        <option value="fiction">Tiểu thuyết</option>
                        <option value="education">Giáo dục</option>
                        <option value="technology">Công nghệ</option>
                        <option value="history">Lịch sử</option>
                        <option value="business">Kinh doanh</option>
                        <option value="self-help">Kỹ năng sống</option>
                        <option value="art">Nghệ thuật</option>
                        <option value="children">Trẻ em</option>
                        <option value="other">Khác</option>
                    </select>
                    <div class="error"></div>
                </div>

                <!-- Publication Year -->
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="publicationYear" class="form-label">Năm XB *</label>
                        <input type="number" class="form-control" id="publicationYear" name="publicationYear" placeholder="2023" min="1900" max="2099" required>
                        <div class="error"></div>
                    </div>

                    <!-- Number of Pages -->
                    <div class="form-group col-md-6">
                        <label for="pages" class="form-label">Số Trang *</label>
                        <input type="number" class="form-control" id="pages" name="pages" placeholder="300" min="1" required>
                        <div class="error"></div>
                    </div>
                </div>

                <!-- Condition -->
                <div class="form-group">
                    <label for="condition" class="form-label">Tình Trạng *</label>
                    <select class="form-control" id="condition" name="condition" required>
                        <option value="">-- Chọn tình trạng --</option>
                        <option value="new">Mới</option>
                        <option value="like-new">Như mới</option>
                        <option value="good">Tốt</option>
                        <option value="fair">Trung bình</option>
                    </select>
                    <div class="error"></div>
                </div>

                <!-- Price -->
                <div class="form-group">
                    <label for="price" class="form-label">Giá Bán (VNĐ) *</label>
                    <input type="number" class="form-control" id="price" name="price" placeholder="50000" min="0" step="1000" required>
                    <div class="error"></div>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="description" class="form-label">Mô Tả Chi Tiết</label>
                    <textarea class="form-control" id="description" name="description" rows="4" placeholder="Mô tả về sách, tình trạng, lý do bán..."></textarea>
                    <div class="error"></div>
                </div>

                <!-- Image Upload -->
                <div class="form-group">
                    <label for="image" class="form-label">Ảnh Sách *</label>
                    <input type="file" class="form-control" id="image" name="image" accept="image/*" required>
                    <small class="form-text text-muted">Chọn ảnh từ máy tính (JPG, PNG, GIF)</small>
                    <div class="error"></div>
                </div>

                <!-- Seller Contact -->
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="sellerName" class="form-label">Tên Người Bán *</label>
                        <input type="text" class="form-control" id="sellerName" name="sellerName" placeholder="Nguyễn Văn A" required>
                        <div class="error"></div>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="sellerPhone" class="form-label">Số Điện Thoại *</label>
                        <input type="text" class="form-control" id="sellerPhone" name="sellerPhone" placeholder="0123456789" required>
                        <div class="error"></div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="button-submit">
                    <button type="submit" class="btn btn-primary">Đăng Bán</button>
                    <button type="reset" class="btn btn-secondary">Xóa</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
