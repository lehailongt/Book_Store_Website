<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Dashboard</title>
  <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../admin-style.css" />
  <link rel="stylesheet" href="../css/admin-dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="../javascript/admin-dashboard.js"></script>
</head>

<body>
  <div class="admin-shell">

    <aside class="sidebar">
      <div class="brand">
        <span class="logo">LT</span>
        <span>Admin</span>
      </div>
      <div class="section">Menu</div>
      <nav class="nav">
        <a href="./admin-dashboard.html" class="active"><i class="bi bi-grid icon"></i>Dashboard</a>
        <a href="./admin-order.html"><i class="bi bi-receipt icon"></i>Order</a>
        <a href="./admin-user.html"><i class="bi bi-people icon"></i>User</a>
        <a href="./admin-book.html"><i class="bi bi-book icon"></i>Book</a>
        <a href="./login.html"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title"><strong>Dashboard</strong></div>
        <div class="actions">
          <!-- <button class="btn btn-primary"><i class="bi bi-plus"></i> Create</button> -->
          <div class="profile" style="margin-left: 10px;">
            <img src="../images/pages/admin.png" alt="Admin Profile">
          </div>
        </div>
      </div>
      <div class="content">
        <div class="cards">
          <div class="card stat">
            <h3>Tổng đơn hàng</h3>
            <div class="value">1,284</div>
          </div>
          <div class="card stat">
            <h3>Doanh thu</h3>
            <div class="value">₫ 128,400,000</div>
          </div>
          <div class="card stat">
            <h3>Khách hàng mới</h3>
            <div class="value">312</div>
          </div>
          <div class="card stat">
            <h3>Sách đang bán</h3>
            <div class="value">984</div>
          </div>
        </div>

        <!-- Chart Block -->
        <div class="chart-container"
          style="background: var(--surface); padding: 24px; border-radius: var(--radius-xl); margin-bottom: 32px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h3 style="margin: 0; color: #1f2937;">Biểu đồ doanh thu</h3>
            <select id="revenueFilter" class="input" style="width: auto;">
              <option value="day">Theo Ngày (Hôm nay)</option>
              <option value="week" selected>Theo Tuần</option>
              <option value="month">Theo Tháng</option>
            </select>
          </div>
          <div style="position: relative; height: 300px; width: 100%;">
            <canvas id="revenueChart"></canvas>
          </div>
        </div>

      </div>
    </main>

  </div>
</body>

</html>
