<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Dashboard</title>
  <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../admin-style.css" />
  <link rel="stylesheet" href="../css/admin-dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="../javascript/admin-dashboard.js"></script>
</head>

<body>
  <div class="admin-shell">

    <aside class="sidebar">
      <div class="brand">
        <span class="logo">LT</span>
        <span>Admin</span>
      </div>
      <div class="section">Menu</div>
      <nav class="nav">
        <a href="./admin-dashboard.html" class="active"><i class="bi bi-grid icon"></i>Dashboard</a>
        <a href="./admin-order.html"><i class="bi bi-receipt icon"></i>Order</a>
        <a href="./admin-user.html"><i class="bi bi-people icon"></i>User</a>
        <a href="./admin-book.html"><i class="bi bi-book icon"></i>Book</a>
        <a href="./admin-category.html"><i class="bi bi-tag icon"></i>Category</a>
        <a href="./login.html"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title"><strong>Dashboard</strong></div>
        <div class="actions">
          <!-- <button class="btn btn-primary"><i class="bi bi-plus"></i> Create</button> -->
          <div class="profile" style="margin-left: 10px;">
            <img src="../images/pages/admin.png" alt="Admin Profile">
          </div>
        </div>
      </div>
      <div class="content">
        <div class="cards">
          <div class="card stat">
            <h3>Doanh thu</h3>
            <div class="value" id="m-revenue">₫ 0</div>
          </div>
          <div class="card stat">
            <h3>Số người dùng</h3>
            <div class="value" id="m-total-users">0</div>
          </div>
          <div class="card stat">
            <h3>Số sách</h3>
            <div class="value" id="m-total-books">0</div>
          </div>
          <div class="card stat">
            <h3>Sách đã bán</h3>
            <div class="value" id="m-total-books-sold">0</div>
          </div>
        </div>

        <!-- Charts -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;">
          <!-- Pie Chart: Order Status -->
          <div class="chart-container"
            style="background: var(--surface); padding: 24px; border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);">
            <h3 style="margin: 0 0 24px 0; color: #1f2937;">Trạng thái đơn hàng</h3>
            <div style="position: relative; height: 300px; width: 100%;">
              <canvas id="orderStatusChart"></canvas>
              <div id="orderCountDisplay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, calc(-50% - 12px)); text-align: center; display: none;">
                <div style="font-size: 32px; font-weight: bold; color: #1f2937;" id="orderCount">0</div>
                <div style="font-size: 12px; color: #6b7280; margin-top: 4px;">Tổng đơn hàng</div>
              </div>
            </div>
          </div>

          <!-- Line Chart: Monthly Revenue -->
          <div class="chart-container"
            style="background: var(--surface); padding: 24px; border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
              <h3 style="margin: 0; color: #1f2937;">Doanh thu theo tháng</h3>
              <select id="yearFilter" class="input" style="width: auto;">
                <option value="2023" selected>2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
              </select>
            </div>
            <div style="position: relative; height: 300px; width: 100%;">
              <canvas id="monthlyRevenueChart"></canvas>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>
</body>

</html>
