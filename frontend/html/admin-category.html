<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Categories</title>
  <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../admin-style.css" />
  <link rel="stylesheet" href="../css/admin-category.css" />
  <script defer src="../javascript/admin-category.js"></script>
</head>

<body>
  <div class="admin-shell">

    <aside class="sidebar">
      <div class="brand">
        <span class="logo">LT</span>
        <span>Admin</span>
      </div>
      <div class="section">Menu</div>
      <nav class="nav">
        <a href="./admin-dashboard.html"><i class="bi bi-grid icon"></i>Dashboard</a>
        <a href="./admin-order.html"><i class="bi bi-receipt icon"></i>Order</a>
        <a href="./admin-user.html"><i class="bi bi-people icon"></i>User</a>
        <a href="./admin-book.html"><i class="bi bi-book icon"></i>Book</a>
        <a href="./admin-category.html" class="active"><i class="bi bi-tag icon"></i>Category</a>
        <a href="./login.html"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title"><strong>Categories</strong></div>
        <div class="actions">
          <button id="btn-create-category" class="btn btn-primary">
            <i class="bi bi-plus"></i> Thêm danh mục
          </button>
          <div class="profile" style="margin-left: 10px;">
            <img src="../images/pages/admin.png" alt="Admin Profile">
          </div>
        </div>
      </div>

      <div class="content">
        <div class="table-wrap">
          <div class="table-toolbar">
            <div class="search">
              <i class="bi bi-search"></i>
              <input id="keyword" class="input" placeholder="Tìm kiếm danh mục theo tên" />
            </div>
            <button id="btn-search" class="btn btn-primary">
              <i class="bi bi-search"></i> Tìm kiếm
            </button>
          </div>

          <table class="table" id="category-table">
            <thead>
              <tr>
                <th>STT</th>
                <th data-sort-field="category_id">ID</th>
                <th data-sort-field="category_name">Tên Danh Mục</th>
                <th data-sort-field="book_count">Số Lượng Sách</th>
                <th>Thao Tác</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dữ liệu sẽ được load bằng JavaScript -->
            </tbody>
          </table>
        </div>

        <div class="table-bottom-bar" style="margin-top:10px">
          <div class="page-size-control">
            <label for="page-size">Hiển thị:</label>
            <select id="page-size" class="filter-select" title="Số dòng mỗi trang">
              <option value="10">10 dòng</option>
              <option value="20">20 dòng</option>
              <option value="50">50 dòng</option>
              <option value="100">100 dòng</option>
            </select>
          </div>
          <div class="pagination">
            <button id="page-prev" class="btn"><i class="bi bi-chevron-left"></i></button>
            <div id="page-info" class="page-info">Trang 1</div>
            <button id="page-next" class="btn"><i class="bi bi-chevron-right"></i></button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Thêm/Sửa Category -->
  <div id="categoryModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Thêm Danh Mục</h2>
        <button id="closeModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="categoryForm">
          <div class="form-group">
            <label for="categoryName">Tên Danh Mục <span class="required">*</span></label>
            <input type="text" id="categoryName" name="categoryName" required placeholder="Nhập tên danh mục" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="cancelBtn" class="btn btn-secondary">Hủy</button>
        <button id="submitBtn" class="btn btn-primary">Lưu</button>
      </div>
    </div>
  </div>

  <!-- Modal Xác nhận xóa -->
  <div id="deleteModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Xác Nhận Xóa</h2>
        <button id="closeDeleteModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <p id="deleteMessage"></p>
      </div>
      <div class="modal-footer">
        <button id="cancelDeleteBtn" class="btn btn-secondary">Hủy</button>
        <button id="confirmDeleteBtn" class="btn btn-danger">Xóa</button>
      </div>
    </div>
  </div>

</body>

</html>
