<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Books</title>
  <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../admin-style.css" />
  <link rel="stylesheet" href="../css/admin-book.css" />
  <script defer src="../javascript/admin-book.js"></script>
</head>
<body>
<div class="admin-shell">

<aside class="sidebar">
  <div class="brand">
    <span class="logo">LT</span> 
    <span>Admin</span>
  </div>
  <div class="section">Menu</div>
  <nav class="nav">
    <a href="./admin-dashboard.html" class="active"><i class="bi bi-grid icon"></i>Dashboard</a>
    <a href="./admin-order.html"><i class="bi bi-receipt icon"></i>Order</a>
    <a href="./admin-user.html"><i class="bi bi-people icon"></i>User</a>
    <a href="./admin-book.html"><i class="bi bi-book icon"></i>Book</a>
    <a href="./login.html"><i class="bi bi-box-arrow-right"></i>Logout</a>
  </nav>
</aside>

<main class="main">
  <div class="topbar">
    <div class="title"><strong>Books</strong></div>
    <div class="actions">
      <button id="btn-create-book" class="btn btn-primary"><i class="bi bi-plus"></i> Thêm sách</button>
    </div>
  </div>
  <div class="content">
    <div class="table-wrap">
      <div class="table-toolbar">
        <select id="category-filter"><option value="">Tất cả danh mục</option></select>
        <div class="search"><i class="bi bi-search"></i><input id="keyword" class="input" placeholder="Tìm kiếm sách"/></div>
        <button id="btn-search" class="btn">Lọc</button>
        <div style="margin-left:auto"></div>
        <button id="btn-refresh" class="btn">Tải lại</button>
      </div>
      <table class="table" id="book-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Ảnh</th>
            <th>Tên sách</th>
            <th>Danh mục</th>
            <th>Giá</th>
            <th>Tồn kho</th>
            <th>Ngày tạo</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="pagination" style="margin-top:10px"></div>
  </div>
</main>

</div>
</body>
</html>
