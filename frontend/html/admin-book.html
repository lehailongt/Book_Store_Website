<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Books</title>
  <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../admin-style.css" />
  <link rel="stylesheet" href="../css/admin-book.css" />
  <script defer src="../javascript/admin-book.js"></script>
</head>

<body>
  <div class="admin-shell">

    <aside class="sidebar">
      <div class="brand">
        <span class="logo">LT</span>
        <span>Admin</span>
      </div>
      <div class="section">Menu</div>
      <nav class="nav">
        <a href="./admin-dashboard.html"><i class="bi bi-grid icon"></i>Dashboard</a>
        <a href="./admin-order.html"><i class="bi bi-receipt icon"></i>Order</a>
        <a href="./admin-user.html"><i class="bi bi-people icon"></i>User</a>
        <a href="./admin-book.html" class="active"><i class="bi bi-book icon"></i>Book</a>
        <a href="./login.html"><i class="bi bi-box-arrow-right"></i>Logout</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title"><strong>Books</strong></div>
        <div class="actions">
          <button id="btn-create-book" class="btn btn-primary">
            <i class="bi bi-plus"></i> Thêm sách
          </button>
          <div class="profile" style="margin-left: 10px;">
            <img src="../images/pages/admin.png" alt="Admin Profile">
          </div>
        </div>
      </div>
      <div class="content">
        <div class="table-wrap">
          <div class="table-toolbar">
            <div class="filter-group">
              <select id="category-filter" class="filter-select">
                <option value="">Tất cả danh mục</option>
                <option value="van-hoc">Văn học</option>
                <option value="kinh-te">Kinh tế</option>
                <option value="ky-nang">Kỹ năng sống</option>
                <option value="thieu-nhi">Thiếu nhi</option>
                <option value="giao-khoa">Giáo khoa</option>
              </select>

              <select id="price-filter" class="filter-select">
                <option value="">Tất cả giá</option>
                <option value="0-100000">Dưới 100,000đ</option>
                <option value="100000-200000">100,000đ - 200,000đ</option>
                <option value="200000-300000">200,000đ - 300,000đ</option>
                <option value="300000-500000">300,000đ - 500,000đ</option>
                <option value="500000-9999999">Trên 500,000đ</option>
              </select>
            </div>

            <div class="search">
              <i class="bi bi-search"></i>
              <input id="keyword" class="input" placeholder="Tìm kiếm sách theo tên hoặc tác giả" />
            </div>

            <button id="btn-search" class="btn btn-primary">
              <i class="bi bi-filter"></i> Lọc
            </button>
          </div>

          <table class="table" id="book-table">
            <thead>
              <tr>
                <th>STT</th>
                <th>Mã sách</th>
                <th>Ảnh</th>
                <th>Tên sách</th>
                <th>Tên tác giả</th>
                <th>Loại sách</th>
                <th>Giá</th>
                <th>Ngày xuất bản</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dữ liệu sẽ được load bằng JavaScript -->
            </tbody>
          </table>
        </div>
        <div class="table-bottom-bar" style="margin-top:10px">
          <div class="page-size-control">
            <label for="page-size">Hiển thị:</label>
            <select id="page-size" class="filter-select" title="Số dòng mỗi trang">
              <option value="5">5 dòng</option>
              <option value="10" selected>10 dòng</option>
              <option value="20">20 dòng</option>
              <option value="all">1 page</option>
            </select>
          </div>
          <div id="pagination"></div>
        </div>
      </div>
    </main>

    <!-- Create Book Modal -->
    <div id="createBookModal" class="custom-modal" style="display:none;">
      <div class="modal-content modal-book">
        <div class="modal-header">
          <h4>Thêm Sách</h4>
          <button type="button" class="btn-modal-close" onclick="document.getElementById('createBookModal').style.display='none'">&times;</button>
        </div>
        <div class="modal-body">
          <form id="create-book-form" novalidate>
            <div class="book-form-row">
              <div class="form-group">
                <label for="cb-name">Tên sách <span class="required">*</span></label>
                <input type="text" id="cb-name" class="input" placeholder="Nhập tên sách" maxlength="50" />
                <span class="field-error" id="cb-name-err"></span>
              </div>
              <div class="form-group">
                <label for="cb-author">Tên tác giả <span class="required">*</span></label>
                <input type="text" id="cb-author" class="input" placeholder="Nhập tên tác giả" maxlength="50" />
                <span class="field-error" id="cb-author-err"></span>
              </div>
            </div>
            <div class="book-form-row">
              <div class="form-group">
                <label for="cb-price">Giá (VNĐ) <span class="required">*</span></label>
                <input type="number" id="cb-price" class="input" placeholder="VD: 195000" min="0.01" step="0.01" />
                <span class="field-error" id="cb-price-err"></span>
              </div>
              <div class="form-group">
                <label for="cb-publish-date">Ngày xuất bản</label>
                <input type="date" id="cb-publish-date" class="input" />
              </div>
            </div>
            <div class="form-group">
              <label for="cb-description">Mô tả</label>
              <textarea id="cb-description" class="input" placeholder="Nhập mô tả sách" style="height:72px;resize:vertical;"></textarea>
            </div>
            <div class="form-group">
              <label>Hình ảnh sách</label>
              <div class="book-image-row">
                <img id="cb-image-preview" src="" alt="Preview" class="book-img-preview" style="display:none;" />
                <div class="image-upload-ctrl">
                  <input type="file" id="cb-image-file" class="input" accept="image/*" />
                  <small class="hint-text">File ảnh sẽ được lưu tại images/books/[id].png</small>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>Thể loại <span class="required">*</span></label>
              <div class="category-input-wrapper">
                <select id="cb-category-select" class="input" style="flex:1;">
                  <option value="">-- Chọn thể loại --</option>
                </select>
                <button type="button" id="cb-add-category-btn" class="btn btn-secondary" style="padding:8px 12px;">Thêm</button>
              </div>
              <div id="cb-categories-tags" class="categories-tag-list"></div>
              <span class="field-error" id="cb-categories-err"></span>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('createBookModal').style.display='none'">Hủy</button>
              <button type="submit" id="cb-submit-btn" class="btn btn-primary">Lưu</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Edit Book Modal -->
    <div id="editBookModal" class="custom-modal" style="display:none;">
      <div class="modal-content modal-book">
        <div class="modal-header">
          <h4>Sửa Sách</h4>
          <button type="button" class="btn-modal-close" onclick="document.getElementById('editBookModal').style.display='none'">&times;</button>
        </div>
        <div class="modal-body">
          <form id="edit-book-form" novalidate>
            <input type="hidden" id="eb-id" />
            <div class="book-form-row">
              <div class="form-group">
                <label for="eb-name">Tên sách <span class="required">*</span></label>
                <input type="text" id="eb-name" class="input" placeholder="Nhập tên sách" maxlength="50" />
                <span class="field-error" id="eb-name-err"></span>
              </div>
              <div class="form-group">
                <label for="eb-author">Tên tác giả <span class="required">*</span></label>
                <input type="text" id="eb-author" class="input" placeholder="Nhập tên tác giả" maxlength="50" />
                <span class="field-error" id="eb-author-err"></span>
              </div>
            </div>
            <div class="book-form-row">
              <div class="form-group">
                <label for="eb-price">Giá (VNĐ) <span class="required">*</span></label>
                <input type="number" id="eb-price" class="input" placeholder="VD: 195000" min="0.01" step="0.01" />
                <span class="field-error" id="eb-price-err"></span>
              </div>
              <div class="form-group">
                <label for="eb-publish-date">Ngày xuất bản</label>
                <input type="date" id="eb-publish-date" class="input" />
              </div>
            </div>
            <div class="form-group">
              <label for="eb-description">Mô tả</label>
              <textarea id="eb-description" class="input" placeholder="Nhập mô tả sách" style="height:72px;resize:vertical;"></textarea>
            </div>
            <div class="form-group">
              <label>Hình ảnh sách</label>
              <div class="book-image-row">
                <img id="eb-image-preview" src="" alt="Preview" class="book-img-preview" style="display:none;" />
                <div class="image-upload-ctrl">
                  <input type="file" id="eb-image-file" class="input" accept="image/*" />
                  <small class="hint-text">Chọn file mới để thay ảnh (lưu tại images/books/[id].png)</small>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>Thể loại <span class="required">*</span></label>
              <div class="category-input-wrapper">
                <select id="eb-category-select" class="input" style="flex:1;">
                  <option value="">-- Chọn thể loại --</option>
                </select>
                <button type="button" id="eb-add-category-btn" class="btn btn-secondary" style="padding:8px 12px;">Thêm</button>
              </div>
              <div id="eb-categories-tags" class="categories-tag-list"></div>
              <span class="field-error" id="eb-categories-err"></span>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('editBookModal').style.display='none'">Hủy</button>
              <button type="submit" id="eb-submit-btn" class="btn btn-primary">Cập nhật</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>
</body>

</html>
