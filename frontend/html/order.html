<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore</title>
    <link rel="icon" type="image/x-icon" href="../images/pages/icon-website.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/order.css">
    <script defer src="../javascript/header.js"></script>
    <script defer src="../javascript/order.js"></script>
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="nav-logo">
                <h2><i class="bi bi-book"></i> BookStore</h2>
            </div>
            <div class="nav-menu">
                <!-- Injected via header.js -->
            </div>
        </nav>
    </header>

    <main class="cart-main">
        <div class="cart-container">
            <h1>Quản lý Đơn Hàng</h1>
            <p id="orderMessage"></p>
            <div id="ordersContainer">
                <table class="table" id="ordersTable">
                    <thead>
                        <tr>
                            <th>Đơn hàng</th>
                            <th>Ngày</th>
                            <th>Tổng</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody">
                        <!-- orders rendered here -->
                    </tbody>
                </table>
                <div id="noOrders" style="display:none; text-align:center;">Bạn chưa có đơn hàng nào.</div>
            </div>
            <a href="./home.html" class="continue-link">Quay về trang chủ</a>
        </div>
    </main>

</body>

</html>
